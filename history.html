<script>
    // ========== 生成五年模拟数据 ==========
    function generateHistoryData() {
        const data = [];
        const startYear = 2022;
        const years = 5;
        for (let y = 0; y < years; y++) {
            const year = startYear + y;
            const seasons = ['春', '夏', '秋', '冬'];
            seasons.forEach((season, sIdx) => {
                // 施工前：基线160，逐年微增，季节波动
                const beforeBase = 160 + y * 3;
                const seasonFactor = [0.8, 1.0, 0.7, 0.55][sIdx];
                const beforeVal = Math.round(beforeBase * seasonFactor + (Math.random() - 0.5) * 20);
                
                // 施工后：逐年下降，保留季节波动
                const afterBase = 150 * (1 - (y +
