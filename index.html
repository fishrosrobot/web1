    <style>

        .upload-zone p {

        /* ===== 图片画廊 ===== */
        .gallery-item {
            position: relative;
            width: 140px;

            border-radius: 12px;

        }
        .gallery-item img {
            width: 100%;

        .gallery-item:hover img {

        .gallery-item .badge-season {
            position: absolute;

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@4/dist/js/adminlte.min.js"></script>

<script>
    // ============================================================
    // 1. 模拟数据生成（五年季节性碳排放）
    // ============================================================
    function generateFiveYearData(startYear = 2022) {
        const years = 5;
        const monthsPerYear = 48; // 每月一个点，共 48 个月
        const totalPoints = years * 12;
        const categories = [];
        const beforeData = [];
        const afterData = [];

        for (let i = 0; i < totalPoints; i++) {
            const year = startYear + Math.floor(i / 12);
            const month = (i % 12) + 1;
            categories.push(`${year}-${String(month).padStart(2,'0')}`);

            // 季节因子：冬季低 (0.6), 春季回升 (0.8), 夏季高 (1.0), 秋季下降 (0.7)
            let seasonalFactor;
            if (month >= 3 && month <= 5) seasonalFactor = 0.8 + Math.random() * 0.15;  // 春
            else if (month >= 6 && month <= 8) seasonalFactor = 0.95 + Math.random() * 0.1; // 夏
            else if (month >= 9 && month <= 11) seasonalFactor = 0.7 + Math.random() * 0.15; // 秋
            else seasonalFactor = 0.55 + Math.random() * 0.15; // 冬

            // 施工前：基线 160 + 随机噪声，每年略升（模拟退化）
            const baseBefore = 160 + (year - startYear) * 3;
            const noiseBefore = (Math.random() - 0.5) * 20;
            const valBefore = Math.max(100, baseBefore + noiseBefore * seasonalFactor);
            beforeData.push(Math.round(valBefore));

            // 施工后：从第1年开始逐步下降，但保留季节波动
            // 假设施工在第0年年底完成，第1年开始见效
            const reductionRate = Math.min(1, (year - startYear + 1) / 6); // 逐年递减
            const baseAfter = 150 * (1 - reductionRate * 0.7) + 30;
            const noiseAfter = (Math.random() - 0.5) * 15;
            const valAfter = Math.max(20, baseAfter + noiseAfter * seasonalFactor);
            afterData.push(Math.round(valAfter));
        }
        return { categories, beforeData, afterData };
    }

    const fiveYearData = generateFiveYearData(2022);

    // ============================================================
    // 2. 初始化 ECharts
    // ============================================================
    const chartDom = document.getElementById('carbonChart');
    const myChart = echarts.init(chartDom);

    function buildOption(showBefore = true, showAfter = true) {
        const series = [];
        if (showBefore) {
            series.push({
                name: '施工前 (退化趋势)',
                type: 'line',
                data: fiveYearData.beforeData,
                smooth: true,
                symbol: 'none',
                lineStyle: { width: 2, color: '#e53935' },
                areaStyle: { color: 'rgba(229,57,53,0.1)' },
                markLine: {
                    silent: true,
                    data: [{ type: 'average', name: '平均值' }],
                    label: { formatter: '平均: {c}' }
                }
            });
        }
        if (showAfter) {
            series.push({
                name: '施工后 (恢复趋势)',
                type: 'line',
                data: fiveYearData.afterData,
                smooth: true,
                symbol: 'none',
                lineStyle: { width: 2, color: '#43a047' },
                areaStyle: { color: 'rgba(67,160,71,0.15)' },
                markLine: {
                    silent: true,
                    data: [{ type: 'average', name: '平均值' }],
                    label: { formatter: '平均: {c}' }
                }
            });
        }
        return {
            tooltip: {
                trigger: 'axis',
                formatter: function(params) {
                    let res = '<strong>' + params[0].axisValue + '</strong><br/>';
                    params.forEach(p => {
                        res += p.marker + ' ' + p.seriesName + ': ' + p.value + ' kg/ha<br/>';
                    });
                    return res;
                }
            },
            legend: {
                data: ['施工前 (退化趋势)', '施工后 (恢复趋势)'],
                top: 10,
                textStyle: { fontSize: 13 }
            },
            grid: { left: '3%', right: '4%', bottom: '8%', containLabel: true },
            xAxis: {
                type: 'category',
                data: fiveYearData.categories,
                axisLabel: {
                    interval: 11, // 每年显示一个标签
                    rotate: 45,
                    fontSize: 10
                },
                splitLine: { show: false }
            },
            yAxis: {
                type: 'value',
                name: '碳排放量 (kg/ha)',
                min: 0,
                max: 250,
                splitLine: { lineStyle: { type: 'dashed', color: '#ddd' } }
            },
            dataZoom: [
                { type: 'inside', start: 0, end: 100 },
                { type: 'slider', start: 0, end: 100, height: 20, bottom: 10 }
            ],
            series: series
        };
    }

    myChart.setOption(buildOption(true, true));

    // 图表切换按钮
    document.getElementById('viewBoth').addEventListener('click', function() {
        document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        myChart.setOption(buildOption(true, true), true);
    });
    document.getElementById('viewBefore').addEventListener('click', function() {
        document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        myChart.setOption(buildOption(true, false), true);
    });
    document.getElementById('viewAfter').addEventListener('click', function() {
        document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        myChart.setOption(buildOption(false, true), true);
    });

    // 自适应
    window.addEventListener('resize', () => myChart.resize());

    // ============================================================
    // 3. 图片上传与检测模拟
    // ============================================================
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const gallery = document.getElementById('imageGallery');
    const emptyHint = document.getElementById('emptyHint');
    const imageCountBadge = document.getElementById('imageCountBadge');
    const detectionResult = document.getElementById('detectionResult');
    const totalImagesSpan = document.getElementById('totalImages');
    const currentCarbonSpan = document.getElementById('currentCarbon');
    const totalReductionSpan = document.getElementById('totalReduction');
    const seasonCountSpan = document.getElementById('seasonCount');

    let imageCount = 0;
    let lastDetection = null;

    // 模拟后端检测
    function simulateDetection() {
        const seasons = ['春', '夏', '秋', '冬'];
        const seasonIdx = Math.floor(Math.random() * 4);
        const season = seasons[seasonIdx];
        const monthMap = { '春': [3,4,5], '夏': [6,7,8], '秋': [9,10,11], '冬': [12,1,2] };
        const possibleMonths = monthMap[season];
        const month = possibleMonths[Math.floor(Math.random() * possibleMonths.length)];
        // 碳排放量：根据季节和施工后趋势模拟
        let base = 60;
        if (season === '夏') base = 80;
        else if (season === '冬') base = 35;
        else if (season === '春') base = 55;
        else if (season === '秋') base = 50;
        const carbon = Math.round(base + (Math.random() - 0.5) * 20);
        const confidence = Math.round(85 + Math.random() * 12);
        return { season, month, carbon, confidence };
    }

    function updateDetectionUI(detection) {
        const seasonClass = 'season-' + detection.season.toLowerCase();
        detectionResult.innerHTML = `
            <div class="row align-items-center">
                <div class="col-md-5 text-center">
                    <span class="season-badge ${seasonClass}">
                        <i class="bi bi-${detection.season === '春' ? 'flower1' : detection.season === '夏' ? 'sun' : detection.season === '秋' ? 'cloud-sun' : 'snow'}"></i>
                        ${detection.season}季
                    </span>
                    <div class="mt-2"><strong>月份:</strong> ${detection.month}月</div>
                </div>
                <div class="col-md-7">
                    <div class="d-flex justify-content-around">
                        <div class="text-center">
                            <div class="fs-3 fw-bold" style="color:#2e7d32;">${detection.carbon}</div>
                            <small class="text-muted">碳排放 (kg/ha)</small>
                        </div>
                        <div class="text-center">
                            <div class="fs-3 fw-bold" style="color:#1565c0;">${detection.confidence}%</div>
                            <small class="text-muted">置信度</small>
                        </div>
                    </div>
                </div>
            </div>
            <hr class="my-2">
            <small class="text-muted">与去年同期相比：${detection.carbon > 60 ? '偏高' : '偏低'} · 建议持续监测</small>
        `;
        // 更新统计卡片
        currentCarbonSpan.textContent = detection.carbon;
        seasonCountSpan.textContent = detection.season + '季';
        // 模拟总减排量（随便算一下）
        const totalReduction = Math.round((fiveYearData.beforeData[0] - detection.carbon) * 0.87);
        totalReductionSpan.textContent = totalReduction;
    }

    function addImageToGallery(src, detection) {
        if (emptyHint && !emptyHint.hidden) {
            emptyHint.hidden = true;
        }
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.innerHTML = `
            <img src="${src}" alt="草场照片">
            <span class="badge-season">${detection.season}季</span>
            <button class="delete-btn" title="删除">&times;</button>
        `;
        div.querySelector('.delete-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            div.remove();
            imageCount--;
            updateCounters();
            if (imageCount === 0) {
                emptyHint.hidden = false;
                detectionResult.innerHTML = `<i class="bi bi-hourglass-split" style="font-size: 2rem; color: #aaa;"></i>
                                             <p class="text-muted mt-2">上传图片后，此处将显示季节、月份及预估碳排放量</p>`;
            }
        });
        gallery.appendChild(div);
        imageCount++;
        updateCounters();
        // 更新检测结果
        updateDetectionUI(detection);
    }

    function updateCounters() {
        imageCountBadge.textContent = imageCount + ' 张';
        totalImagesSpan.textContent = imageCount;
    }

    // 处理上传
    function handleFiles(files) {
        const maxFiles = 10;
        const toProcess = Array.from(files).slice(0, maxFiles - imageCount);
        toProcess.forEach(file => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const detection = simulateDetection();
                addImageToGallery(e.target.result, detection);
            };
            reader.readAsDataURL(file);
        });
    }

    // 点击上传
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', function(e) {
        handleFiles(e.target.files);
        this.value = ''; // 允许重复上传相同文件
    });

    // 拖拽上传
    dropZone.addEventListener('dragover', function(e) {
        e.preventDefault();
        this.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', function(e) {
        e.preventDefault();
        this.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', function(e) {
        e.preventDefault();
        this.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) handleFiles(files);
    });

    // ============================================================
    // 4. 初始演示数据（预置两张示例图片，展示效果）
    // ============================================================
    // 使用占位图片模拟
    const demoDetections = [
        { season: '夏', month: 7, carbon: 72, confidence: 91 },
        { season: '冬', month: 1, carbon: 38, confidence: 88 }
    ];
    const demoUrls = [
        'https://via.placeholder.com/280x210/81c784/ffffff?text=草场+夏季',
        'https://via.placeholder.com/280x210/90caf9/ffffff?text=草场+冬季'
    ];
    demoUrls.forEach((url, idx) => {
        const detection = demoDetections[idx];
        addImageToGallery(url, detection);
    });

    // 更新统计卡片初始值
    totalReductionSpan.textContent = 86;
    currentCarbonSpan.textContent = 72;
    totalImagesSpan.textContent = 2;
    seasonCountSpan.textContent = '夏季';

    console.log('🌿 草场碳汇监测系统已启动！');
</script>
<script>
    $(document).ready(function () {
        // 1. 激活菜单的高亮和点击切换效果
        // 获取当前页面的 URL 路径，比如 "index.html"
        var path = window.location.pathname.split('/').pop(); 
        
        // 遍历所有左侧菜单
        $('.nav-sidebar a').each(function() {
            // 如果菜单链接包含当前文件名，就给父级加高亮样式
            if ($(this).attr('href') && $(this).attr('href').indexOf(path) !== -1) {
                $(this).parent().addClass('active');
                // 如果是在折叠菜单里，展开父菜单
                if ($(this).parent().parent().hasClass('nav-treeview')) {
                    $(this).parent().parent().parent().addClass('active');
                    $(this).parent().parent().parent().children('a').first().addClass('active');
                }
            }

            // 绑定点击事件：点击后关闭移动端的侧边栏
            $(this).on('click', function(e) {
                // 如果是子菜单项，阻止默认跳转（因为我们还没做其他页面）
                if ($(this).parent().hasClass('nav-treeview')) {
                    e.preventDefault();
                }
                
                // 移动端点击菜单后自动收起侧边栏
                if ($('body').hasClass('sidebar-collapse')) {
                    $('body').removeClass('sidebar-collapse');
                }
            });
        });

        // 2. 让顶部搜索框有呼吸动画效果
        $('.form-control-navbar').on('focus', function() {
            $(this).closest('.input-group').addClass('focused');
        }).on('blur', function() {
            $(this).closest('.input-group').removeClass('focused');
        });
    });
</script>
</body>
</html>
